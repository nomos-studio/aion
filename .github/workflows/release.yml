# SPDX-License-Identifier: GPL-2.0-or-later
#
# aion release — builds binaries for macOS (arm64) and Linux (amd64) on
# version tags and uploads them as GitHub Release assets.
#
# Trigger: push a tag matching v[0-9]* (e.g. v0.3.0)
# Assets:  aion-v<N>-macos-arm64.tar.gz
#          aion-v<N>-linux-amd64.tar.gz

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: macos-arm64
            artifact: aion-${{ github.ref_name }}-macos-arm64
          - os: ubuntu-24.04
            target: linux-amd64
            artifact: aion-${{ github.ref_name }}-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libasound2-dev

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-cmake-deps-release-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-deps-release-

      - name: Configure (release, no local nomos-rt)
        run: cmake -S . -B build --preset ci -DAION_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p dist
          cp build/aion dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist aion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: aion-${{ github.ref_name }}-macos-arm64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: aion-${{ github.ref_name }}-linux-amd64

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aion-${{ github.ref_name }}-macos-arm64.tar.gz
            aion-${{ github.ref_name }}-linux-amd64.tar.gz
          generate_release_notes: true
